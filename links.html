<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>link</title>
    <style>
        /* Unvisited link */
        a:link{
            color: red;
            text-decoration: none;
            background-color: yellow;
        }
        /* just click that link and it changed into another color */
        a:visited{
            color: green;
        }
        /* when we hover our cursor on that link it just change the color whenever we hover the cursor there */
        a:hover{
            color: pink;
            text-decoration:underline;
            background-color: black;
        }
        /* through active whnenever we hold the click on that link it   changed change the color */
        a:active{
            color:black;
            text-decoration: none;
            background-color: violet;
        }
    </style>
</head>
<body>
        <a href="#">This is a link</a>

</body>
</html>
