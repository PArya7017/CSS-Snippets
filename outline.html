<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline</title>
    <style>
        h1{
            outline:5px dotted blue;
            border: 2px solid rgb(146, 45, 45);
        }
        h2{
            outline: 5px dashed green;
            border: solid 2px yellowgreen;
            outline-offset: 4px;
            width: 150px;
            height: 30px;
        }
        h3{
            color: darkviolet;
            border: 5px black solid;
            padding:3px;
            text-align: center;
        }
        p{
            background-color: black;
            color: white;
            padding: 10px;
            border: 5px solid darkviolet;
        }
    </style>
</head>
<body>
    <h1>Outline </h1>
    <h2>Outline-offset</h2>
    <h3>Hello world</h3>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Sed voluptas nam repellat cum velit, laboriosam illum reprehenderit iure? Nobis nemo magni quasi molestiae est.</p>
</body>
</html>
