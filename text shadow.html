<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Shadow</title>
    <style>
        h1{
            text-decoration: 1px underline;
            text-shadow: 2px 2px black;
            color: brown;
        }
        h2{
            text-decoration: 1px underline;
            text-shadow: 2px 2px 5px rgb(25, 22, 154);
            color: rgb(236, 236, 243);
        }
        h3{
            text-decoration: 1px underline;
            color: rgb(0, 0, 0);
            text-shadow: 0 0 4px rgb(255, 0, 25), 0 0 7px blue;
        }
        p{
            text-shadow: 2px 2px 5px green;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>
    <h2>Hello world</h2>
    <h3>Hello world</h3>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nam, harum numquam!</p>
</body>
</html>
