<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <style>
        .a{
            list-style: square;
            background-color: wheat;
            padding: 5px 10px;
        }
        ul li{
            background-color: grey;
            margin: 5px;
            padding: 5px 0px 5px 0px;
        }
        .b{
            list-style: lower-alpha;
        }
    </style>
</head>
<body>
    <h3>Unordered List</h3>
    <ul class="a">
        <li>Coffee</li>
        <li>Coca-cola</li>
        <li>Tea</li>
    </ul>
    <h3>Ordered List</h3>
    <ol class="b">
        <li>Coffee</li>
        <li>Coca-cola</li>
        <li>Tea</li>
    </ol>
</body>
</html>
