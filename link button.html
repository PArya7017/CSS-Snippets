<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link button</title>
    <style>
        a{
           color: white;
           background-color: rgb(212, 127, 255); 
           padding: 10px 20px;
           text-decoration: none;
        }
        a:hover{
            background-color: rgb(255, 0, 170);
            
        }
    </style>
</head>
<body>
    <a href="#">This is a link</a>
</body>
</html>
