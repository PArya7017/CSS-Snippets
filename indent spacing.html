<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indent letterspacing</title>
    <style>
        h1{
            text-indent: 50px;
            letter-spacing: 10px;
        }
        p{
            line-height: 70px;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Recusandae doloremque quis distinctio sint quaerat ut, dicta maiores harum expedita eaque quidem ratione quisquam.</p>
</body>
</html>
